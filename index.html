<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISRUTI INFRA | Under Construction</title>
    <style>
        :root {
            --brand-dark: #061934;
            --brand-gold: #b58e3e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            color: var(--brand-dark);
            text-align: center;
        }

        /* 1. Logo Section (Responsive scaling) */
        .logo-section {
            width: 85%;
            max-width: clamp(180px, 60vw, 280px);
            height: auto;
            margin: 0 auto 2vh auto;
            display: block;
        }

        .logo-path {
            fill: none;
            stroke: var(--brand-dark);
            stroke-width: 15;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 4500;
            stroke-dashoffset: 4500;
            animation: syncBuild 8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        .brand-line {
            fill: none;
            stroke: var(--brand-dark);
            stroke-width: 6;
            stroke-linecap: butt;
            opacity: 0;
            animation: syncFade 8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        .brand-name {
            fill: var(--brand-dark);
            font-size: 110px;
            font-weight: 900;
            opacity: 0;
            animation: syncFade 8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        .subtitle {
            fill: var(--brand-dark);
            font-size: 88px;
            font-weight: 900;
            text-anchor: middle;
            opacity: 0;
            animation: syncFade 8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        /* 2. Message Section */
        .message-section {
            width: 100%;
            text-align: center;
            opacity: 0;
            padding: 0 20px;
            margin: 0 auto 5vh auto;
            animation: syncFade 8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        .message-section h1 {
            font-size: clamp(20px, 6vw, 36px);
            font-weight: 900;
            margin: 0;
            letter-spacing: clamp(2px, 1vw, 5px);
            text-transform: uppercase;
        }

        .message-section p {
            font-size: clamp(12px, 3.5vw, 18px);
            font-weight: 500;
            margin-top: 8px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* 3. Verticals Section (Clean Text Only) */
        .verticals-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: clamp(15px, 4vw, 40px);
            width: 100%;
            max-width: 800px;
            margin: 3vh auto 0 auto;
            padding: 0 20px;
            opacity: 0;
            animation: syncFade 8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        .sub-label {
            font-size: clamp(10px, 3vw, 15px);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Responsive "Two-Line" logic for non-desktop */
        @media (max-width: 1024px) {
            .verticals-row {
                max-width: 400px; /* Adjusted to ensure clean wrapping */
                gap: 15px 30px;
            }
        }

        @keyframes syncBuild {
            0% { stroke-dashoffset: 4500; opacity: 0; }
            5% { opacity: 1; }
            45% { stroke-dashoffset: 0; }
            85% { stroke-dashoffset: 0; opacity: 1; }
            100% { stroke-dashoffset: -4500; opacity: 0; }
        }

        @keyframes syncFade {
            0% { opacity: 0; transform: translateY(15px); }
            5% { opacity: 0; }
            45% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Centerpiece Logo -->
    <div class="logo-section">
        <svg viewBox="94 100 600 1000" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto;">
            <path class="logo-path" d="M246,222 L145,222 L246,398 L394,153 L542,398 L643,222 L542,222 L442,417 L482,495 L394,647 L306,495 L346,417 L394,339 L442,417 L394,494 L346,417 L246,222" />
            <path class="brand-line" d="M 145,700 L 643,700" />
            <text x="145" y="830" class="brand-name" textLength="498" lengthAdjust="spacing">VISRUTI</text>
            <path class="brand-line" d="M 145,915 L 230,915" />
            <path class="brand-line" d="M 145,935 L 230,935" />
            <text x="394" y="950" class="subtitle">INFRA</text>
            <path class="brand-line" d="M 558,915 L 643,915" />
            <path class="brand-line" d="M 558,935 L 643,935" />
        </svg>
    </div>

    <!-- Status Message -->
    <div class="message-section">
        <h1>UNDER CONSTRUCTION</h1>
        <p>Building Excellence for the Future</p>
    </div>

    <!-- Minimalist Brand Verticals (Text Only) -->
    <div class="verticals-row">
        <div class="sub-label">ENGINEERING</div>
        <div class="sub-label">CONSTRUCTION</div>
        <div class="sub-label">INFRASTRUCTURE</div>
    </div>

</body>
</html>
